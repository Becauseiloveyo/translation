<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiteDict 设置</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="options">
      <header class="topbar">
        <div>
          <div class="eyebrow">LiteDict Extension</div>
          <h1>Provider 设置</h1>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Provider 类型</span>
          <select id="providerType">
            <option value="mock">Mock Provider</option>
            <option value="openai">OpenAI Compatible</option>
          </select>
        </label>

        <label class="field">
          <span>Provider 名称</span>
          <input id="providerName" placeholder="My OpenAI-compatible provider" />
        </label>

        <label class="field">
          <span>Base URL</span>
          <input id="baseUrl" placeholder="https://api.example.invalid/v1" />
        </label>

        <label class="field">
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" />
        </label>

        <label class="field">
          <span>Model</span>
          <input id="model" placeholder="gpt-4.1-mini" />
        </label>

        <label class="field">
          <span>默认目标语言</span>
          <select id="targetLang">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </label>

        <div class="controls">
          <button id="saveButton" class="primary" type="button">保存</button>
          <button id="clearHistoryButton" type="button">清空历史</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="panel">
        <h2>隐私</h2>
        <p>设置和历史仅保存在浏览器本地存储。不要在共享 Windows 账户中保存敏感 API key。</p>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
