<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiteDict</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="polish.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div>
          <div class="eyebrow">LiteDict</div>
          <h1>选中单词先查词</h1>
        </div>
        <button id="openOptions" class="icon-button" type="button" title="设置" aria-label="打开设置">⚙</button>
      </header>

      <div class="popup-toolbar">
        <label class="compact-field">
          <span>句子目标语言</span>
          <select id="targetLang">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </label>
        <div class="provider-pill" id="providerName">Lookup first</div>
      </div>

      <section class="popup-card">
        <div class="card-head">
          <div class="card-title">原文</div>
          <div class="source-tools">
            <span id="sourceCount">0 字</span>
            <button id="clearButton" class="ghost small-button" type="button">清空</button>
          </div>
        </div>
        <textarea id="sourceText" placeholder="输入单词查词；输入句子翻译"></textarea>
      </section>

      <section class="popup-card result-card">
        <div class="result-head">
          <div class="card-title">查词 / 翻译结果</div>
          <div class="result-actions">
            <button id="translateButton" class="ghost" type="button">处理</button>
            <button id="copyButton" class="primary" type="button">复制</button>
          </div>
        </div>
        <div id="resultText" class="result-text">查词或译文会显示在这里</div>
      </section>

      <div id="status" class="status" aria-live="polite"></div>

      <section class="history-section">
        <div class="section-head">
          <h2>最近记录</h2>
          <span id="historyCount">0</span>
        </div>
        <div id="historyList" class="history-list">
          <div class="history-empty">暂无历史</div>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
