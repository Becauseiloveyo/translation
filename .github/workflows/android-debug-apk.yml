name: Build Android Debug APK
run-name: Build Android Debug APK @ ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "android/**"
      - "public/**"
      - "capacitor.config.*"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - ".github/workflows/android-debug-apk.yml"

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use npmjs registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set replace-registry-host always

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app and sync Capacitor
        id: web-sync
        run: |
          set +e
          npm run android:sync 2>&1 | tee web-sync.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Web build / Capacitor sync failed"
              echo '```text'
              tail -n 160 web-sync.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: gradle-build
        working-directory: android
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee ../gradle-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Gradle build failed"
              echo '```text'
              tail -n 200 ../gradle-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/LiteDict-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-debug-apk
          path: artifacts/LiteDict-debug.apk
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-build-logs
          path: |
            web-sync.log
            gradle-build.log
          if-no-files-found: ignore
