name: Build Android Release APK
run-name: Build Android Release APK @ ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version name, for example 1.0.1"
        required: true
        default: "1.0.1"
      version_code:
        description: "Android versionCode. Must be greater than the installed version."
        required: true
        default: "2"
      create_github_release:
        description: "Create a permanent GitHub Release and upload APK"
        required: true
        type: boolean
        default: true
      changelog:
        description: "Optional release notes. Leave empty to use recent commit messages."
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "android/**"
      - "public/**"
      - "capacitor.config.*"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - ".github/workflows/android-release-apk.yml"

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release-meta
        env:
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
          INPUT_VERSION_CODE: ${{ github.event.inputs.version_code }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
        run: |
          set -euo pipefail
          VERSION_NAME="${INPUT_VERSION_NAME:-0.1.${GITHUB_RUN_NUMBER}}"
          VERSION_CODE="${INPUT_VERSION_CODE:-$GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${VERSION_NAME}"

          if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "version_code must be an integer." >&2
            exit 1
          fi

          {
            echo "VERSION_NAME=$VERSION_NAME"
            echo "VERSION_CODE=$VERSION_CODE"
            echo "RELEASE_TAG=$RELEASE_TAG"
          } >> "$GITHUB_ENV"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "release_tag=$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

          if [ -n "${INPUT_CHANGELOG:-}" ]; then
            printf '%s\n' "$INPUT_CHANGELOG" > release-notes.md
          else
            {
              echo "## LiteDict ${VERSION_NAME}"
              echo
              echo "### Changes"
              git log --pretty=format:'- %s (`%h`)' -n 20
              echo
            } > release-notes.md
          fi

          {
            echo "## Release metadata"
            echo "- versionName: $VERSION_NAME"
            echo "- versionCode: $VERSION_CODE"
            echo "- tag: $RELEASE_TAG"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "- release mode: automatic on main push"
            else
              echo "- release mode: manual workflow_dispatch"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npmjs registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set replace-registry-host always

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app and sync Capacitor
        id: web-sync
        run: |
          set +e
          npm run android:sync 2>&1 | tee web-sync.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Web build / Capacitor sync failed"
              echo '```text'
              tail -n 160 web-sync.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build unsigned release APK
        id: gradle-release
        working-directory: android
        run: |
          set +e
          ./gradlew assembleRelease -PVERSION_CODE="$VERSION_CODE" -PVERSION_NAME="$VERSION_NAME" --stacktrace 2>&1 | tee ../gradle-release.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Gradle release build failed"
              echo '```text'
              tail -n 200 ../gradle-release.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts signing

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/litedict-release.jks
            KEYSTORE_PATH="signing/litedict-release.jks"
            STORE_PASS="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASS="$ANDROID_KEY_PASSWORD"
            echo "Using fixed signing key from GitHub Secrets." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Missing Android signing secrets. Refusing to build release with a temporary key." >&2
            echo "Missing Android signing secrets. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="artifacts/LiteDict-${VERSION_NAME}-aligned.apk"
          SIGNED_APK="artifacts/LiteDict-release.apk"
          VERSIONED_APK="artifacts/LiteDict-${VERSION_NAME}.apk"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/36.0.0"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass "pass:$STORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify --print-certs "$SIGNED_APK"
          cp "$SIGNED_APK" "$VERSIONED_APK"

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-release-apk
          path: |
            artifacts/LiteDict-release.apk
            artifacts/LiteDict-${{ steps.release-meta.outputs.version_name }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_github_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: LiteDict ${{ steps.release-meta.outputs.version_name }}
          body_path: release-notes.md
          files: |
            artifacts/LiteDict-release.apk
            artifacts/LiteDict-${{ steps.release-meta.outputs.version_name }}.apk
          draft: false
          prerelease: false

      - name: Upload release build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-release-build-logs
          path: |
            web-sync.log
            gradle-release.log
            release-notes.md
          if-no-files-found: ignore
