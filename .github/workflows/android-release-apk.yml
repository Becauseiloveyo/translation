name: Build Android Release APK
run-name: Build Android Release APK @ ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "android/**"
      - "public/**"
      - "capacitor.config.*"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - ".github/workflows/android-release-apk.yml"

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npmjs registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set replace-registry-host always

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app and sync Capacitor
        id: web-sync
        run: |
          set +e
          npm run android:sync 2>&1 | tee web-sync.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Web build / Capacitor sync failed"
              echo '```text'
              tail -n 160 web-sync.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build unsigned release APK
        id: gradle-release
        working-directory: android
        run: |
          set +e
          ./gradlew assembleRelease --stacktrace 2>&1 | tee ../gradle-release.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            {
              echo "## Gradle release build failed"
              echo '```text'
              tail -n 200 ../gradle-release.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p artifacts signing

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/litedict-release.jks
            KEYSTORE_PATH="signing/litedict-release.jks"
            STORE_PASS="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASS="$ANDROID_KEY_PASSWORD"
            echo "Using fixed signing key from GitHub Secrets." >> "$GITHUB_STEP_SUMMARY"
          else
            keytool -genkeypair \
              -keystore signing/litedict-temp-release.jks \
              -storepass android \
              -keypass android \
              -alias litedict \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=LiteDict,O=Personal,C=US"
            KEYSTORE_PATH="signing/litedict-temp-release.jks"
            STORE_PASS="android"
            KEY_ALIAS="litedict"
            KEY_PASS="android"
            echo "Using temporary signing key. Add Android signing secrets for stable upgrades." >> "$GITHUB_STEP_SUMMARY"
          fi

          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="artifacts/LiteDict-release-aligned.apk"
          SIGNED_APK="artifacts/LiteDict-release.apk"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/36.0.0"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass "pass:$STORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify --print-certs "$SIGNED_APK"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-release-apk
          path: artifacts/LiteDict-release.apk
          if-no-files-found: error

      - name: Upload release build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LiteDict-release-build-logs
          path: |
            web-sync.log
            gradle-release.log
          if-no-files-found: ignore
